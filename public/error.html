<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
</head>

<body>
    <section class="container">
        <a href="#" alt="vp-digital">
            <img src="./static/images/logo.png" alt="" class="img-logo">
        </a>

        <div class="wrapper">
            <h1 class="title">Well, this is awkward...</h1>
            <div class="description">
                <p>Something broke. It's probably not your fault. Maybe it is. Who knows?</p>
                <p>Anyway, we're already on it. Take a deep breath, maybe grab a coffee ☕.</p>
                <p>Try refreshing the page, or come back later.</p>
            </div>
        </div>
    </section>

    <style>
        body {
            margin: 0;
            line-height: inherit;
        }

        .wrapper {
            margin-left: auto;
            margin-right: auto;
            margin-top: 200px;
            text-align: center;
            padding: 15px;
        }

        .title {
            font-size: 52px;
            margin: 0;
            margin-bottom: 20px;
            font-weight: bold;
            color: #000000;
        }

        .description p {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #3f3f3f;
        }

        .img-logo {
            width: 9rem;
            position: fixed;
            top: 20px;
            left: 20px;
        }

        .container {
            background-image: url(./static/images/bg-login2.png);
            background-size: cover;
            background-position: center;
            width: 100%;
            height: 100vh;
            display: flex;
        }

        @media only screen and (max-width: 600px) {
            .wrapper {
                margin-top: 170px;
            }

            .title {
                font-size: 28px;
            }

            .description p {
                font-size: 16px;
            }
        }
    </style>
</body>

</html>
